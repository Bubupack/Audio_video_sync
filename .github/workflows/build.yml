name: Build Executables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Pour Linux, on utilise Debian 12 (Bookworm) pour la compatibilité Debian/CachyOS/Arch
          - os: ubuntu-latest
            container: debian:bookworm
          - os: windows-latest
            container: ''
          - os: macos-latest
            container: ''
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg (Linux - Debian)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --windowed --name "AudioVideoSync" main.py

      - name: Compress Build (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/AudioVideoSync -DestinationPath AudioVideoSync-Windows.zip

      - name: Compress Build (Linux)
        if: runner.os == 'Linux'
        run: tar -czvf AudioVideoSync-Linux.tar.gz -C dist AudioVideoSync
        
      - name: Compress Build (macOS)
        if: runner.os == 'macOS'
        run: tar -czvf AudioVideoSync-macOS.tar.gz -C dist AudioVideoSync

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AudioVideoSync-*.zip
            AudioVideoSync-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
